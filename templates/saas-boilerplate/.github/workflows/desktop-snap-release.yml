name: Desktop Snap Release

on:
  push:
    tags:
      - "desktop-v*"

jobs:
  build-and-publish-snap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create production env file
        run: |
          cat <<EOF > apps/desktop/.env.production
          VITE_API_URL=${{ secrets.DESKTOP_VITE_API_URL }}
          VITE_AUTH_EMAIL=${{ vars.DESKTOP_VITE_AUTH_EMAIL }}
          VITE_AUTH_GOOGLE=${{ vars.DESKTOP_VITE_AUTH_GOOGLE }}
          VITE_AUTH_GITHUB=${{ vars.DESKTOP_VITE_AUTH_GITHUB }}
          VITE_AUTH_LINKEDIN=${{ vars.DESKTOP_VITE_AUTH_LINKEDIN }}
          VITE_PAYMENT_GATEWAY=${{ vars.DESKTOP_VITE_PAYMENT_GATEWAY }}
          VITE_SUPPORT_MAIL=${{ vars.DESKTOP_VITE_SUPPORT_MAIL }}
          VITE_CALENDLY_BOOKING_URL=${{ vars.DESKTOP_VITE_CALENDLY_BOOKING_URL }}
          EOF

      - name: Build desktop app (production)
        run: pnpm --filter desktop build:prod

      - name: Package snap
        run: pnpm --filter desktop package:snap

      - name: Install Snapcraft
        uses: samber/actions-snapcraft@v2
        with:
          snapcraft_token: ${{ secrets.SNAPCRAFT_TOKEN }}

      - name: Upload to Snap Store (edge)
        run: |
          SNAP_FILE=$(ls apps/desktop/dist/*.snap)
          snapcraft upload "$SNAP_FILE" --release=edge
